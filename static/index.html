<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Real-time Chat Rooms • Go WebSocket</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background: #e5ddd5;
      background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png');
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    #app-container {
      display: flex;
      width: 100vw;
      height: 100vh;
      background: rgba(255, 255, 255, 0.95);
      position: relative;
      overflow: hidden;
    }

    #sidebar {
      width: 300px;
      background: #f0f2f5;
      border-right: 1px solid #ddd;
      display: flex;
      flex-direction: column;
      padding: 15px;
      transition: transform 0.3s ease;
      z-index: 10;
    }
    .profile-section { margin-bottom: 20px; }
    .profile-section label { font-size: 0.8rem; color: #666; font-weight: bold; }
    #username {
      width: 100%; padding: 8px 12px; border: 1px solid #ccc;
      border-radius: 8px; margin-top: 5px; outline: none;
    }
    .room-controls {
      display: flex; gap: 8px; margin-bottom: 15px;
    }
    .room-controls input {
      flex: 1; padding: 8px; border: 1px solid #ccc; border-radius: 8px; outline: none;
    }
    .room-controls button {
      padding: 8px 12px; background: #00a884; color: white; border: none;
      border-radius: 8px; cursor: pointer; font-weight: bold;
    }
    .sidebar-title { font-size: 0.9rem; color: #54656f; font-weight: 600; margin-bottom: 10px; }
    #room-list {
      flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 5px;
    }
    .room-item {
      padding: 12px; background: white; border-radius: 8px; cursor: pointer;
      display: flex; justify-content: space-between; align-items: center;
      transition: background 0.2s; border: 1px solid #e1e1e1;
    }
    .room-item:hover { background: #f5f6f6; }
    .room-item.active { background: #ffeecd; border-color: #ffbc42; }
    .room-name { font-weight: 600; color: #111; }
    .btn-logout-room {
      background: #ea0038; color: white; border: none; padding: 4px 8px;
      border-radius: 4px; font-size: 0.75rem; cursor: pointer; display: none;
    }
    .room-item.active .btn-logout-room { display: block; }

    #chat-main { flex: 1; display: flex; flex-direction: column; background: #efeae2; height: 100%; }
    #chat-header {
      background: #f0f2f5; padding: 15px; border-bottom: 1px solid #ddd;
      display: flex; align-items: center; gap: 12px;
    }
    #chat-header h3 { color: #111; font-size: 1.1rem; }

    .menu-toggle {
      background: none; border: none; font-size: 1.5rem; cursor: pointer; display: none; color: #54656f;
    }

    #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 6px; }
    
    .message { max-width: 75%; padding: 8px 12px; border-radius: 8px; position: relative; font-size: 0.95rem; box-shadow: 0 1px 1px rgba(0,0,0,0.1); word-wrap: break-word; }
    .message.sent { align-self: flex-end; background: #d9fdd3; }
    .message.received { align-self: flex-start; background: #ffffff; }
    .message .username { font-weight: bold; font-size: 0.8rem; color: #00a884; margin-bottom: 3px; display: block; }
    .message.sent .username { display: none; }

    .input-area { background: #f0f2f5; padding: 12px; display: flex; align-items: center; gap: 10px; }
    #input { flex: 1; padding: 12px; border: 1px solid #ccc; border-radius: 20px; outline: none; font-size: 0.95rem; }
    #btn-send { width: 44px; height: 44px; background: #00a884; color: white; border: none; border-radius: 50%; font-size: 1.2rem; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }

    #sidebar-overlay {
      display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.4); z-index: 5;
    }

    @media (max-width: 768px) {
      .menu-toggle { display: block; }
      #sidebar {
        position: absolute; top: 0; left: 0; bottom: 0;
        transform: translateX(-100%);
      }
      #sidebar.open {
        transform: translateX(0);
      }
      #sidebar.open ~ #sidebar-overlay {
        display: block;
      }
      .message { max-width: 85%; }
    }

    @media (min-width: 769px) {
      #app-container {
        width: 95vw; max-width: 1200px; height: 90vh; border-radius: 12px;
      }
    }
  </style>
</head>
<body>

<div id="app-container">
    <div id="sidebar">
      <div class="profile-section">
        <label for="username">Username Anda</label>
        <input id="username" type="text" placeholder="Nama..." />
      </div>

      <div class="sidebar-title">Cari / Buat Room</div>
      <div class="room-controls">
        <input id="room-input" type="text" placeholder="ID Room" />
        <button onclick="joinNewRoom()">Join</button>
      </div>

      <div class="sidebar-title">History Room Anda</div>
      <div id="room-list"></div>
    </div>

    <div id="sidebar-overlay" onclick="toggleSidebar()"></div>

    <div id="chat-main">
      <div id="chat-header">
        <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
        <h3 id="current-room-title">Pilih atau Masuk ke Room</h3>
      </div>
      
      <div id="messages"></div>

      <div class="input-area">
        <input id="input" type="text" placeholder="Ketik pesan..." disabled />
        <button id="btn-send" onclick="sendMessage()" disabled>➤</button>
      </div>
    </div>
  </div>

  <script>
    let ws = null;
    let currentRoomId = "";

    let joinedRooms = JSON.parse(localStorage.getItem("chat_rooms")) || ["general"];

    const usernameInput = document.getElementById("username");
    if (!localStorage.getItem("chat_username")) {
      localStorage.setItem("chat_username", "User_" + Math.floor(Math.random() * 1000));
    }
    usernameInput.value = localStorage.getItem("chat_username");
    
    usernameInput.onchange = () => {
      if(usernameInput.value.trim()) {
        localStorage.setItem("chat_username", usernameInput.value.trim());
        if(currentRoomId) connectToRoom(currentRoomId);
      }
    };

    renderRoomList();

    function toggleSidebar() {
      const sidebar = document.getElementById("sidebar");
      sidebar.classList.toggle("open");
    }

    function renderRoomList() {
      const roomListContainer = document.getElementById("room-list");
      roomListContainer.innerHTML = "";

      joinedRooms.forEach(roomId => {
        const item = document.createElement("div");
        item.className = `room-item ${roomId === currentRoomId ? 'active' : ''}`;
        item.onclick = () => connectToRoom(roomId);

        const nameSpan = document.createElement("span");
        nameSpan.className = "room-name";
        nameSpan.textContent = `# ${roomId}`;

        // Tombol Logout / Keluar dari Room
        const logoutBtn = document.createElement("button");
        logoutBtn.className = "btn-logout-room";
        logoutBtn.textContent = "Leave";
        logoutBtn.onclick = (e) => {
          e.stopPropagation();
          leaveRoom(roomId);
        };

        item.appendChild(nameSpan);
        item.appendChild(logoutBtn);
        roomListContainer.appendChild(item);
      });
    }

    function joinNewRoom() {
      const roomInput = document.getElementById("room-input");
      const roomId = roomInput.value.trim().toLowerCase();
      if (!roomId) return;

      if (!joinedRooms.includes(roomId)) {
        joinedRooms.push(roomId);
        localStorage.setItem("chat_rooms", JSON.stringify(joinedRooms));
      }
      
      roomInput.value = "";
      connectToRoom(roomId);
    }

    function connectToRoom(roomId) {
      if (ws) { ws.close(); }

      currentRoomId = roomId;
      document.getElementById("current-room-title").textContent = `Room: # ${roomId}`;
      document.getElementById("messages").innerHTML = "";
      document.getElementById("input").disabled = false;
      document.getElementById("btn-send").disabled = false;

      renderRoomList();

      document.getElementById("sidebar").classList.remove("open");

      const wsProtocol = window.location.protocol === "https:" ? "wss://" : "ws://";
      const username = usernameInput.value.trim();
      const wsUrl = `${wsProtocol}${location.host}/ws?username=${encodeURIComponent(username)}&room=${encodeURIComponent(roomId)}`;

      ws = new WebSocket(wsUrl);
      ws.onmessage = (event) => { displayMessage(JSON.parse(event.data)); };
    }

    function leaveRoom(roomId) {
      joinedRooms = joinedRooms.filter(r => r !== roomId);
      localStorage.setItem("chat_rooms", JSON.stringify(joinedRooms));

      if (currentRoomId === roomId) {
        if (ws) ws.close();
        ws = null;
        currentRoomId = "";
        document.getElementById("current-room-title").textContent = "Pilih atau Masuk ke Room";
        document.getElementById("messages").innerHTML = "";
        document.getElementById("input").disabled = true;
        document.getElementById("btn-send").disabled = true;
      }

      renderRoomList();
    }

    function displayMessage(msg) {
      const messagesContainer = document.getElementById("messages");
      const messageDiv = document.createElement("div");
      messageDiv.classList.add("message");

      const myName = usernameInput.value.trim().toLowerCase();
      const sender = msg.username || "Anon";
      
      if (sender.toLowerCase() === myName) {
        messageDiv.classList.add("sent");
      } else {
        messageDiv.classList.add("received");
        const nameSpan = document.createElement("span");
        nameSpan.className = "username";
        nameSpan.textContent = sender;
        messageDiv.appendChild(nameSpan);
      }

      const textNode = document.createTextNode(msg.text);
      messageDiv.appendChild(textNode);
      messagesContainer.appendChild(messageDiv);
      
      messageDiv.scrollIntoView({ behavior: "smooth", block: "end" });
    }

    function sendMessage() {
      const input = document.getElementById("input");
      const text = input.value.trim();

      if (text === "" || !ws || ws.readyState !== WebSocket.OPEN) return;

      const payload = {
        username: usernameInput.value.trim(),
        text: text,
        room_id: currentRoomId
      };

      ws.send(JSON.stringify(payload));
      input.value = "";
      input.focus();
    }

    document.getElementById("input").onkeypress = (e) => {
      if (e.key === "Enter") {
        sendMessage();
      }
    };
  </script>
</body>
</html>
