<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Real-time Chat Rooms • Go WebSocket</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background: #e5ddd5;
      background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png');
      height: 100dvh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    #auth-container {
      background: white; padding: 30px; border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15); width: 90%; max-width: 400px; text-align: center;
    }
    #auth-container h2 { margin-bottom: 20px; color: #111; font-weight: 700; }
    #auth-container input {
      width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ccc;
      border-radius: 8px; outline: none; font-size: 0.95rem;
    }
    #auth-container button {
      width: 100%; padding: 12px; background: #00a884; color: white; border: none;
      border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1rem;
    }
    #auth-container p { margin-top: 15px; font-size: 0.85rem; color: #54656f; }
    #auth-container span { color: #00a884; font-weight: bold; cursor: pointer; }

    #app-container {
      display: flex; width: 100vw; height: 100dvh; background: rgba(255, 255, 255, 0.95);
      position: relative; overflow: hidden;
    }

    #sidebar {
      width: 300px; background: #f0f2f5; border-right: 1px solid #ddd;
      display: flex; flex-direction: column; padding: 15px; transition: transform 0.3s ease; z-index: 10;
    }
    .profile-section { margin-bottom: 20px; }
    .profile-section label { font-size: 0.8rem; color: #666; font-weight: bold; }
    #username {
      width: 100%; padding: 8px 12px; border: 1px solid #ccc;
      border-radius: 8px; margin-top: 5px; outline: none; background-color: #e9ecef; color: #495057;
    }
    .room-controls { display: flex; gap: 8px; margin-bottom: 15px; }
    .room-controls input { flex: 1; padding: 8px; border: 1px solid #ccc; border-radius: 8px; outline: none; }
    .room-controls button { padding: 8px 12px; background: #00a884; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
    .sidebar-title { font-size: 0.9rem; color: #54656f; font-weight: 600; margin-bottom: 10px; }
    #room-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 5px; }
    
    .room-item {
      padding: 12px; background: white; border-radius: 8px; cursor: pointer;
      display: flex; justify-content: space-between; align-items: center; border: 1px solid #e1e1e1;
    }
    .room-item.active { background: #ffeecd; border-color: #ffbc42; }
    .room-info { display: flex; align-items: center; gap: 8px; }
    .room-name { font-weight: 600; color: #111; }

    .room-badge {
      background: #00a884; color: white; border-radius: 50%; min-width: 20px; height: 20px;
      padding: 0 6px; font-size: 0.75rem; font-weight: bold; display: flex; align-items: center; justify-content: center;
    }
    
    .room-actions { display: flex; align-items: center; gap: 6px; }
    .btn-logout-room { background: #ea0038; color: white; border: none; padding: 4px 8px; border-radius: 4px; font-size: 0.75rem; cursor: pointer; display: none; }
    .room-item.active .btn-logout-room { display: block; }
    .btn-logout-app { margin-top: 10px; padding: 10px; background: #ea0038; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 0.9rem; }

    #chat-main { flex: 1; display: flex; flex-direction: column; background: #efeae2; height: 100%; position: relative; }
    #chat-header { background: #f0f2f5; padding: 15px; border-bottom: 1px solid #ddd; display: flex; align-items: center; gap: 12px; }
    #chat-header h3 { color: #111; font-size: 1.1rem; }
    .menu-toggle { background: none; border: none; font-size: 1.5rem; cursor: pointer; display: none; color: #54656f; }
    #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 6px; }
    
    .message { max-width: 75%; padding: 8px 12px; border-radius: 8px; position: relative; font-size: 0.95rem; box-shadow: 0 1px 1px rgba(0,0,0,0.1); word-wrap: break-word; }
    .message.sent { align-self: flex-end; background: #d9fdd3; }
    .message.received { align-self: flex-start; background: #ffffff; }
    .message .username { font-weight: bold; font-size: 0.8rem; color: #00a884; margin-bottom: 3px; display: block; }
    .message.sent .username { display: none; }

    .input-area { background: #f0f2f5; padding: 12px; display: flex; align-items: center; gap: 10px; position: relative; }
    
    .textarea-wrapper {
      flex: 1;
      position: relative;
      display: flex;
      align-items: center;
      background: white;
      border: 1px solid #ccc;
      border-radius: 12px;
    }

    #input { 
      flex: 1; padding: 10px 75px 10px 15px; border: none; background: transparent;
      outline: none; font-size: 0.95rem; resize: none; height: 44px; 
      font-family: inherit; line-height: 1.4;
    }

    .btn-emoji {
      position: absolute; right: 12px; background: none; border: none;
      font-size: 1.3rem; cursor: pointer; outline: none; user-select: none;
    }
    .btn-emoji:disabled { opacity: 0.5; cursor: not-allowed; }

    .emoji-picker {
      position: absolute; 
      bottom: 65px; 
      right: 65px; 
      width: 320px;
      max-height: 250px;
      background: white; 
      border: 1px solid #ccc; 
      border-radius: 8px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.15); 
      display: none; 
      flex-wrap: wrap;
      padding: 10px; 
      overflow-y: auto;
      gap: 10px; 
      z-index: 100;
    }
    .emoji-item {
      font-size: 1.3rem; cursor: pointer; user-select: none; transition: transform 0.1s ease;
    }
    .emoji-item:hover { transform: scale(1.2); }

    #btn-send { width: 44px; height: 44px; background: #00a884; color: white; border: none; border-radius: 50%; font-size: 1.2rem; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    #btn-send:disabled { opacity: 0.6; cursor: not-allowed; }

    #sidebar-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.4); z-index: 5; }

    @media (max-width: 768px) {
      .menu-toggle { display: block; }
      #sidebar { position: absolute; top: 0; left: 0; bottom: 0; transform: translateX(-100%); }
      #sidebar.open { transform: translateX(0); }
      #sidebar.open ~ #sidebar-overlay { display: block; }
      .emoji-picker { right: 15px; bottom: 65px; }
    }
    @media (min-width: 769px) { #app-container { width: 95vw; max-width: 1200px; height: 90vh; border-radius: 12px; } }
  </style>
</head>
<body>
  <audio id="notif-sound" src="/static/notification.mp3?v=2" preload="auto" />
  
  <form id="auth-container" onsubmit="handleAuth(event)">
    <h2 id="auth-title">Login MS Chat</h2>
    <input type="text" id="auth-username" placeholder="Username" required />
    <input type="password" id="auth-password" placeholder="Password" required />
    <button type="submit" id="btn-auth-submit">Masuk</button>
    <p id="auth-toggle-text">Belum punya akun? <span onclick="toggleAuthMode()">Daftar disini</span></p>
  </form>

  <div id="app-container" style="display: none;">
    <div id="sidebar">
      <div class="profile-section">
        <label for="username">Username Anda</label>
        <input id="username" type="text" readonly disabled />
      </div>
      <div class="sidebar-title">Cari / Buat Room</div>
      <div class="room-controls">
        <input id="room-input" type="text" placeholder="ID Room" />
        <button onclick="joinNewRoom()">Join</button>
      </div>
      <div class="sidebar-title">History Room Anda</div>
      <div id="room-list"></div>
      <button class="btn-logout-app" onclick="logoutApp()">Logout Akun</button>
    </div>

    <div id="sidebar-overlay" onclick="toggleSidebar()"></div>

    <div id="chat-main">
      <div id="chat-header">
        <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
        <h3 id="current-room-title">Pilih atau Masuk ke Room</h3>
      </div>
      <div id="messages"></div>
      
      <div id="emoji-picker" class="emoji-picker"></div>

      <div class="input-area">
        <div class="textarea-wrapper">
          <input type="file" id="file-input" style="display: none;" onchange="handleFileUpload()" />
          <button id="btn-upload" class="btn-emoji" style="right: 45px;" onclick="document.getElementById('file-input').click()" disabled>📎</button>
          
          <textarea id="input" placeholder="Ketik pesan..." disabled></textarea>
          <button id="btn-emoji" class="btn-emoji" onclick="toggleEmojiPicker()" disabled>😊</button>
        </div>
        <button id="btn-send" onclick="sendMessage()" disabled>➤</button>
      </div>
    </div>
  </div>
  <div id="media-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.85); z-index: 9999; justify-content: center; align-items: center; flex-direction: column;">
    <span onclick="closeMediaModal()" style="position: absolute; top: 20px; right: 30px; color: white; font-size: 2.5rem; font-weight: bold; cursor: pointer; user-select: none;">&times;</span>
    <div id="modal-content" style="max-width: 90%; max-height: 80%; display: flex; justify-content: center; align-items: center;">
      </div>
    <div id="modal-caption" style="color: #ccc; margin-top: 15px; font-size: 1rem; text-align: center; word-break: break-all; padding: 0 20px;"></div>
  </div>

  <script>
    let ws = null;
    let currentRoomId = "";
    let isRegisterMode = false;
    let joinedRooms = [];
    let unreadCounts = {}; 

    let MY_AUTHENTIC_USERNAME = ""; 
    const usernameInput = document.getElementById("username");

    const emojiList = [
      "😊", "😂", "🤣", "😁", "😀", "😄", "😅", "😆", "😉", "😍", 
      "🥰", "😘", "😗", "😚", "😋", "😛", "😝", "😜", "🤪", "😎", 
      "🤓", "🧐", "🥳", "🤩", "😏", "😒", "😞", "😔", "😟", "😕", 
      "🙁", "☹️", "😣", "😖", "😫", "😩", "🥺", "😢", "😭", "😤", 
      "😠", "😡", "🤬", "🤯", "😳", "🥵", "🥶", "😱", "😨", "😰", 
      "😥", "😓", "🤔", "🤭", "🤫", "🤥", "😶", "😐", "😑", "😬", 
      "🙄", "😯", "😦", "😧", "😮", "😲", "🥱", "😴", "🤤", "😪", 
      "😵", "🤐", "🥴", "🤢", "🤮", "🤧", "😷", "🤒", "🤕", "💩", 
      "🤡", "👻", "💀", "👽", "🤖", "👍", "👎", "👌", "🤌", "✊", 
      "✋", "✌️", "🤞", "🤟", "🤘", "🤙", "👈", "👉", "👆", "🖕", 
      "👇", "☝️", "👋", "🤚", "🖐️", "🖖", "👏", "🙌", "🙏", "🤝", 
      "💪", "✍️", "🤳", "💅", "❤️", "🧡", "💛", "💚", "💙", "💜", 
      "🖤", "🤍", "🤎", "💔", "❣️", "💕", "💞", "💓", "💗", "💖", 
      "💘", "💝", "💟", "🔥", "🚀", "✨", "🎉", "🎊", "💥", "⭐", 
      "🌟", "💫", "🎈", "🎀", "🎁", "🎫", "🏆", "💯", "¼", "💠", 
      "💻", "🖥️", "🖨️", "⌨️", "🖱️", "📱", "☎️", "📞", "📟", "📠", 
      "💾", "💿", "📀", "🎥", "🎬", "📺", "📷", "📸", "📹", "📼", 
      "🔍", "🔎", "💡", "🔦", "🏮", "🧱", "⚙️", "🛠️", "⚒️", "🔧", 
      "🔩", "⚖️", "🔗", "⛓️", "🧰", "🛡️", "🔑", "🗝️", "💬", "👁️‍🗨️", 
      "🗯️", "💭", "📢", "📣", "🔔", "🔕", "📝", "🗒️", "🗓️", "📅", 
      "📈", "📉", "📊", "📋", "📌", "📍", "📎", "🖇️", "📏", "📐", 
      "✂️", "🔒", "🔓", "🔏", "🔐", "📦", "📫", "🏢", "🏪", "🏫", 
      "🏛️", "✅", "❌", "⚠️", "🚫", "⭕", "❓", "❔", "❗", "❕", 
      "➕", "➖", "✖️", "➗", "🟪", "🟦", "🟥", "🟧", "🟨", "🟩"
    ];

    function requestNotificationPermission() {
      if (!("Notification" in window)) return;
      if (Notification.permission !== "granted" && Notification.permission !== "denied") {
        Notification.requestPermission();
      }
    }

    function initEmojiPicker() {
      const picker = document.getElementById("emoji-picker");
      picker.innerHTML = "";
      emojiList.forEach(emoji => {
        const span = document.createElement("span");
        span.className = "emoji-item";
        span.textContent = emoji;
        span.onclick = () => insertEmoji(emoji);
        picker.appendChild(span);
      });
    }

    function toggleEmojiPicker() {
      const picker = document.getElementById("emoji-picker");
      picker.style.display = picker.style.display === "flex" ? "none" : "flex";
    }

    function insertEmoji(emoji) {
      const input = document.getElementById("input");
      input.value += emoji;
      input.focus();
    }

    document.addEventListener("click", (e) => {
      const picker = document.getElementById("emoji-picker");
      const btnEmoji = document.getElementById("btn-emoji");
      if (picker && btnEmoji && !picker.contains(e.target) && e.target !== btnEmoji) {
        picker.style.display = "none";
      }
    });

    function getUsernameFromJWT(token) {
      try {
        const base64Url = token.split('.')[1];
        const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
        const jsonPayload = decodeURIComponent(window.atob(base64).split('').map(function(c) {
            return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
        }).join(''));
        return JSON.parse(jsonPayload).username;
      } catch (e) { return ""; }
    }

    function toggleAuthMode() {
      isRegisterMode = !isRegisterMode;
      document.getElementById("auth-title").textContent = isRegisterMode ? "Daftar Akun" : "Login MS Chat";
      document.getElementById("btn-auth-submit").textContent = isRegisterMode ? "Daftar" : "Masuk";
      document.getElementById("auth-toggle-text").innerHTML = isRegisterMode 
        ? 'Sudah punya akun? <span onclick="toggleAuthMode()">Login disini</span>' 
        : 'Belum punya akun? <span onclick="toggleAuthMode()">Daftar disini</span>';
    }

    async function handleAuth(e) {
      if (e) e.preventDefault();
      const username = document.getElementById("auth-username").value.trim();
      const password = document.getElementById("auth-password").value;
      if (!username || !password) return alert("Silakan isi semua kolom!");

      const url = isRegisterMode ? "/api/register" : "/api/login";
      try {
        const response = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const result = await response.json();
        if (!response.ok) return alert(result.error || "Terjadi kesalahan!");

        document.getElementById("auth-username").value = "";
        document.getElementById("auth-password").value = "";
        localStorage.setItem("chat_token", result.token);
        showChatApp();
      } catch (err) { alert("Gagal terhubung ke server."); }
    }

    async function fetchUserRooms() {
      const token = localStorage.getItem("chat_token");
      if (!token) return;
      try {
        const response = await fetch("/api/rooms", {
          method: "GET",
          headers: { "Authorization": `Bearer ${token}` }
        });
        if (response.status === 401) return logoutApp();
        const result = await response.json();
        if (response.ok) joinedRooms = result.rooms || [];
      } catch (e) { console.error(e); }
    }

    async function showChatApp() {
      const token = localStorage.getItem("chat_token");
      MY_AUTHENTIC_USERNAME = getUsernameFromJWT(token);
      if (!MY_AUTHENTIC_USERNAME) return logoutApp();

      await fetchUserRooms();
      document.getElementById("auth-container").style.display = "none";
      document.getElementById("app-container").style.removeProperty('display');
      usernameInput.value = MY_AUTHENTIC_USERNAME;
      renderRoomList();
      initEmojiPicker();
      requestNotificationPermission();
    }

    function logoutApp() {
      if (ws) ws.close();
      localStorage.removeItem("chat_token");
      location.reload();
    }

    function toggleSidebar() {
      document.getElementById("sidebar").classList.toggle("open");
    }

    function renderRoomList() {
      const roomListContainer = document.getElementById("room-list");
      roomListContainer.innerHTML = "";
      joinedRooms.forEach(roomId => {
        const item = document.createElement("div");
        item.className = `room-item ${roomId === currentRoomId ? 'active' : ''}`;
        item.onclick = () => connectToRoom(roomId);

        const infoDiv = document.createElement("div");
        infoDiv.className = "room-info";

        const nameSpan = document.createElement("span");
        nameSpan.className = "room-name";
        nameSpan.textContent = `# ${roomId}`;
        infoDiv.appendChild(nameSpan);

        if (unreadCounts[roomId] && unreadCounts[roomId] > 0 && roomId !== currentRoomId) {
          const badge = document.createElement("span");
          badge.className = "room-badge";
          badge.textContent = unreadCounts[roomId];
          infoDiv.appendChild(badge);
        }

        const actionsDiv = document.createElement("div");
        actionsDiv.className = "room-actions";

        const logoutBtn = document.createElement("button");
        logoutBtn.className = "btn-logout-room";
        logoutBtn.textContent = "Leave";
        logoutBtn.onclick = (e) => { e.stopPropagation(); leaveRoom(roomId); };
        actionsDiv.appendChild(logoutBtn);

        item.appendChild(infoDiv);
        item.appendChild(actionsDiv);
        roomListContainer.appendChild(item);
      });
    }

    async function joinNewRoom() {
      const roomInput = document.getElementById("room-input");
      const roomId = roomInput.value.trim().toLowerCase();
      if (!roomId) return;

      const token = localStorage.getItem("chat_token");
      try {
        const response = await fetch("/api/rooms/join", {
          method: "POST",
          headers: { "Content-Type": "application/json", "Authorization": `Bearer ${token}` },
          body: JSON.stringify({ room_id: roomId })
        });
        if (response.ok) {
          if (!joinedRooms.includes(roomId)) joinedRooms.push(roomId);
          roomInput.value = "";
          connectToRoom(roomId);
        } else { alert("Gagal join ke room!"); }
      } catch (err) { alert("Terjadi kesalahan sistem."); }
    }

    function connectToRoom(roomId) {
      if (ws) ws.close();
      currentRoomId = roomId;
      unreadCounts[roomId] = 0;

      document.getElementById("current-room-title").textContent = `Room: # ${roomId}`;
      document.getElementById("messages").innerHTML = "";
      document.getElementById("input").disabled = false;
      document.getElementById("btn-emoji").disabled = false;
      document.getElementById("btn-send").disabled = false;
      document.getElementById("btn-upload").disabled = false;

      renderRoomList();
      document.getElementById("sidebar").classList.remove("open");

      const wsProtocol = window.location.protocol === "https:" ? "wss://" : "ws://";
      const token = localStorage.getItem("chat_token");
      const wsUrl = `${wsProtocol}${location.host}/ws?token=${encodeURIComponent(token)}&room=${encodeURIComponent(roomId)}`;

      ws = new WebSocket(wsUrl);
      ws.onmessage = (event) => { 
        if (!event.data.trim()) return;
        try { displayMessage(JSON.parse(event.data)); } catch (e) { console.error(e); }
      };
      ws.onclose = (e) => {
        if (e.code === 1006 || e.reason.includes("Unauthorized")) {
          alert("Sesi tidak valid! Silakan login kembali.");
          logoutApp();
        }
      };
    }

    async function leaveRoom(roomId) {
      const token = localStorage.getItem("chat_token");
      try {
        const response = await fetch("/api/rooms/leave", {
          method: "DELETE",
          headers: { "Content-Type": "application/json", "Authorization": `Bearer ${token}` },
          body: JSON.stringify({ room_id: roomId })
        });
        if (response.ok) {
          joinedRooms = joinedRooms.filter(r => r !== roomId);
          delete unreadCounts[roomId];
          if (currentRoomId === roomId) {
            ws = null; currentRoomId = "";
            document.getElementById("current-room-title").textContent = "Pilih atau Masuk ke Room";
            document.getElementById("messages").innerHTML = "";
            document.getElementById("input").disabled = true;
            document.getElementById("btn-emoji").disabled = true;
            document.getElementById("btn-send").disabled = true;
            document.getElementById("btn-upload").disabled = true;
          }
          renderRoomList();
        }
      } catch (e) { console.error(e); }
    }

    async function handleFileUpload() {
      const fileInput = document.getElementById("file-input");
      if (fileInput.files.length === 0) return;

      const file = fileInput.files[0];
      const formData = new FormData();
      formData.append("file", file);

      const token = localStorage.getItem("chat_token");
      const btnUpload = document.getElementById("btn-upload");

      try {
        btnUpload.textContent = "⏳";
        btnUpload.disabled = true;

        const response = await fetch(`/api/upload?room_id=${encodeURIComponent(currentRoomId)}`, {
          method: "POST",
          headers: { "Authorization": `Bearer ${token}` },
          body: formData
        });
        const result = await response.json();
        btnUpload.textContent = "📎";
        btnUpload.disabled = false;

        if (!response.ok) return alert(result.error || "Gagal mengunggah file");

        if (ws && ws.readyState === WebSocket.OPEN) {
          const payload = {
            username: MY_AUTHENTIC_USERNAME,
            text: `[FILE:${result.url},${result.file_type},${result.filename}]`,
            room_id: currentRoomId
          };
          ws.send(JSON.stringify(payload));
        }
        fileInput.value = "";
      } catch (err) {
        alert("Terjadi kesalahan saat mengunggah.");
        btnUpload.textContent = "📎";
        btnUpload.disabled = false;
      }
    }

    function displayMessage(msg) {
      const messagesContainer = document.getElementById("messages");
      const targetRoom = msg.room_id || currentRoomId;
      const sender = msg.username || "Anon";
      const isMyOwnMessage = sender.toLowerCase() === MY_AUTHENTIC_USERNAME.toLowerCase();

      if (targetRoom !== currentRoomId) {
        if (!isMyOwnMessage && !msg.is_history) {
          unreadCounts[targetRoom] = (unreadCounts[targetRoom] || 0) + 1;
          renderRoomList();
          playNotifSound();
          showDesktopNotification(`Pesan baru di #${targetRoom}`, `${sender}: ${msg.text}`);
        }
        return; 
      }

      const messageDiv = document.createElement("div");
      messageDiv.classList.add("message");
      let isIncoming = false;

      if (isMyOwnMessage) {
        messageDiv.classList.add("sent");
      } else {
        messageDiv.classList.add("received");
        isIncoming = true;
        const nameSpan = document.createElement("span");
        nameSpan.className = "username";
        nameSpan.textContent = sender;
        messageDiv.appendChild(nameSpan);
      }

      const textContentSpan = document.createElement("span");
      let rawText = msg.text || "";

      if (rawText.startsWith("[FILE:") && rawText.endsWith("]")) {
        const fileData = rawText.slice(6, -1).split(",");
        const fileUrl = fileData[0];
        const fileType = fileData[1] || "";
        const fileName = fileData.slice(2).join(",");

        if (fileType.startsWith("image/")) {
          textContentSpan.innerHTML = `<img src="${fileUrl}" alt="${fileName}" style="max-width: 100%; max-height: 250px; border-radius: 8px; margin-top: 5px; display: block; cursor: pointer;" onclick="openMediaModal('${fileUrl}', 'image', '${fileName}')"/>`;
        } else if (fileType.startsWith("video/")) {
          textContentSpan.innerHTML = `
            <div style="position: relative; cursor: pointer; margin-top: 5px;" onclick="openMediaModal('${fileUrl}', 'video', '${fileName}')">
              <video style="max-width: 100%; max-height: 250px; border-radius: 8px; display: block; pointer-events: none;">
                <source src="${fileUrl}" type="${fileType}">
              </video>
              <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.6); color: white; width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.5rem;">▶</div>
            </div>`;
        } else {
          textContentSpan.innerHTML = `<div style="display: flex; align-items: center; gap: 8px; background: rgba(0,0,0,0.05); padding: 8px; border-radius: 6px; margin-top: 5px;"><span>📄</span><a href="${fileUrl}" target="_blank" download="${fileName}" style="color: #027eb5; text-decoration: underline; font-weight: 500; word-break: break-all;">${fileName}</a></div>`;
        }
      } else {
        let safeText = rawText.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
        const urlPattern = /(\b(https?|ftp|file):\/\/[-A-Z0-9+&@#\/%?=~_|!:,.;]*[-A-Z0-9+&@#\/%=~_|]|\bwww\.[-A-Z0-9+&@#\/%?=~_|!:,.;]*[-A-Z0-9+&@#\/%=~_|])/ig;
        
        let formattedText = safeText.replace(urlPattern, function(url) {
          let hrefUrl = url;
          if (!/^https?:\/\//i.test(url)) hrefUrl = 'http://' + url;
          return `<a href="${hrefUrl}" target="_blank" style="color: #027eb5; text-decoration: underline;">${url}</a>`;
        });
        textContentSpan.innerHTML = formattedText.replace(/\n/g, "<br/>");
      }

      messageDiv.appendChild(textContentSpan);
      messagesContainer.appendChild(messageDiv);
      messageDiv.scrollIntoView({ behavior: "smooth", block: "end" });

      if (isIncoming && !msg.is_history) {
        playNotifSound();
        if (document.hidden) {
          showDesktopNotification(`Pesan baru di #${currentRoomId}`, `${sender}: ${msg.text}`);
        }
      }
    }

    function showDesktopNotification(title, body) {
      if (Notification.permission === "granted") {
        const notif = new Notification(title, { body: body, icon: "https://cdn-icons-png.flaticon.com/512/733/733577.png" });
        setTimeout(() => notif.close(), 4000);
        notif.onclick = () => window.focus();
      }
    }

    function playNotifSound() {
      const sound = document.getElementById("notif-sound");
      if (sound) { sound.currentTime = 0; sound.play().catch(()=>{}); }
    }

    function sendMessage() {
      const input = document.getElementById("input");
      const text = input.value.trim();
      if (text === "" || !ws || ws.readyState !== WebSocket.OPEN) return;

      ws.send(JSON.stringify({ username: MY_AUTHENTIC_USERNAME, text: text, room_id: currentRoomId }));
      input.value = "";
      input.focus();
      document.getElementById("emoji-picker").style.display = "none";
    }

    function openMediaModal(url, type, filename) {
      const modal = document.getElementById("media-modal");
      const content = document.getElementById("modal-content");
      const caption = document.getElementById("modal-caption");

      content.innerHTML = "";
      caption.textContent = filename;

      if (type === 'image') {
        content.innerHTML = `<img src="${url}" style="max-width: 100%; max-height: 80vh; border-radius: 4px; box-shadow: 0 4px 20px rgba(0,0,0,0.5);" />`;
      } else if (type === 'video') {
        content.innerHTML = `<video controls autoplay style="max-width: 100%; max-height: 80vh; border-radius: 4px; box-shadow: 0 4px 20px rgba(0,0,0,0.5);"><source src="${url}">Browser Anda tidak mendukung video.</video>`;
      }

      modal.style.display = "flex";
    }

    function closeMediaModal() {
      const modal = document.getElementById("media-modal");
      const content = document.getElementById("modal-content");

      content.innerHTML = ""; 
      modal.style.display = "none";
    }

    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') {
        closeMediaModal();
      }
    });

    document.getElementById("input").onkeydown = (e) => {
      if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    };

    if (localStorage.getItem("chat_token")) showChatApp();
  </script>
</body>
</html>
