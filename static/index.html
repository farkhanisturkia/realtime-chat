<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Real-time Chat • Go WebSocket</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #e5ddd5;
      background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png');
      background-repeat: repeat;
      background-size: auto;
      height: 100vh;
      display: flex;
      flex-direction: column;
      color: #111;
    }

    h2 {
      text-align: center;
      padding: 12px 0 8px;
      font-size: 1.4rem;
      font-weight: 600;
      color: #111;
      background: rgba(255,255,255,0.7);
      margin-bottom: 4px;
    }

    #chat-container {
      flex: 1;
      max-width: 920px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      background: rgba(255,255,255,0.35);
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px 12px 8px;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .message {
      max-width: 76%;
      margin: 4px 10px;
      padding: 9px 14px;
      border-radius: 7.5px;
      position: relative;
      word-wrap: break-word;
      font-size: 0.96rem;
      line-height: 1.38;
      box-shadow: 0 1px 0.5px rgba(0,0,0,0.13);
    }

    .message.sent {
      align-self: flex-end;
      background: #d9fdd3;
      border-bottom-right-radius: 2px;
    }

    .message.received {
      align-self: flex-start;
      background: #ffffff;
      border-bottom-left-radius: 2px;
    }

    .input-area {
      background: #f0f0f0;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-top: 1px solid #d1d1d1;
    }

    #input {
      flex: 1;
      padding: 11px 16px;
      border: 1px solid #c8c8c8;
      border-radius: 24px;
      font-size: 0.95rem;
      outline: none;
      background: white;
    }

    button {
      width: 48px;
      height: 48px;
      background: #25d366;
      color: white;
      border: none;
      border-radius: 50%;
      font-size: 1.32rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.18s;
    }

    button:hover {
      background: #1ebe52;
    }

    button:active {
      background: #20b058;
    }

    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-thumb {
      background: #bbb;
      border-radius: 3px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }
  </style>
</head>
<body>

  <div id="chat-container">
    <h2>Real-time Chat</h2>
    
    <div id="messages"></div>

    <div class="input-area">
      <input id="input" type="text" placeholder="Ketik pesan..." autofocus />
      <button onclick="sendMessage()">➤</button>
    </div>
  </div>

  <script>
    // ────────────────────────────────────────────────
    // Generate random 12-char anonymous ID
    // ────────────────────────────────────────────────
    function generateRandomId(length = 12) {
      const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789";
      let result = "";
      for (let i = 0; i < length; i++) {
        result += chars.charAt(Math.floor(Math.random() * chars.length));
      }
      return result;
    }

    // Username di-generate sekali dan tidak bisa diubah
    const username = generateRandomId();

    // ────────────────────────────────────────────────
    // WebSocket connection
    // ────────────────────────────────────────────────
    const ws = new WebSocket("ws://" + location.host + "/ws?username=" + encodeURIComponent(username));

    ws.onopen = () => {
      console.log("Connected as anonymous → " + username);
    };

    ws.onclose = () => {
      console.log("Disconnected from server.");
    };

    ws.onmessage = (event) => {
      try {
        const msg = JSON.parse(event.data);

        const messageDiv = document.createElement("div");
        messageDiv.classList.add("message");

        const myId = username.trim().toLowerCase();
        const senderId = (msg.username || "???").trim().toLowerCase();
        const isMe = senderId === myId;

        if (isMe) {
          messageDiv.classList.add("sent");
        } else {
          messageDiv.classList.add("received");
          // Tidak menampilkan username sama sekali
        }

        const textNode = document.createTextNode(msg.text);
        messageDiv.appendChild(textNode);

        document.getElementById("messages").appendChild(messageDiv);
        messageDiv.scrollIntoView({ behavior: "smooth", block: "end" });
      } catch (err) {
        // Fallback
        const div = document.createElement("div");
        div.classList.add("message", "received");
        div.textContent = event.data;
        document.getElementById("messages").appendChild(div);
        div.scrollIntoView({ behavior: "smooth", block: "end" });
      }
    };

    // ────────────────────────────────────────────────
    // Send message
    // ────────────────────────────────────────────────
    function sendMessage() {
      const input = document.getElementById("input");
      const text = input.value.trim();

      if (text === "" || ws.readyState !== WebSocket.OPEN) return;

      const payload = {
        username: username,
        text: text
      };

      ws.send(JSON.stringify(payload));
      input.value = "";
      input.focus();
    }

    document.getElementById("input").onkeypress = (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    };

    // Fokus ke input saat halaman dibuka
    document.getElementById("input").focus();
  </script>

</body>
</html>
